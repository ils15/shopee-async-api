name: Tests & Coverage

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=shopee_async_api --cov-report=term-missing --cov-report=xml --cov-fail-under=80

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Check code formatting with Black
      run: black --check shopee_async_api tests
      continue-on-error: true

    - name: Check import sorting with isort
      run: isort --check-only shopee_async_api tests
      continue-on-error: true

    - name: Type check with mypy
      run: mypy shopee_async_api --ignore-missing-imports
      continue-on-error: true
